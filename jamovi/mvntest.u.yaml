title: Multivariate Normality Test
name: mvntest
jus: '3.0'
stage: 0
compilerMode: aggressive
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: 'Variables (min: 2)'
        children:
          - type: VariablesListBox
            name: vars
            isTarget: true
      - type: TargetLayoutBox
        label: Grouping Variable
        children:
          - type: VariablesListBox
            name: group
            maxItemCount: 1
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: mvnTest
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: univariateTest
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showDescriptives
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: outlierMethod
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: outlierAlpha
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: transform
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: powerFamily
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: scale
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: impute
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: bootstrap
  - type: LayoutBox
    margin: large
    children:
      - type: TextBox
        name: nBoot
        format: number
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: showQQPlot
      - type: CheckBox
        name: showUniPlots
      - type: CheckBox
        name: showBoxPlots
      - type: CheckBox
        name: showHistograms
