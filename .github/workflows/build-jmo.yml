name: Build .jmo

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.config.label }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  label: linux,   suffix: linux   }
          - { os: macos-latest,   label: macos,   suffix: macos   }
          - { os: windows-latest, label: windows, suffix: win64   }

    env:
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'
          use-public-rspm: true

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgsl-dev libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libjpeg-dev libtiff5-dev libcairo2-dev \
            libudunits2-dev libgdal-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gsl cairo

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::jmvcore
            any::R6
            any::nortest
            any::moments
            any::MASS
            any::boot
            any::car
            any::dplyr
            any::tidyr
            any::purrr
            any::stringr
            any::tibble
            any::ggplot2
            any::viridis
            any::cli
            any::energy
            any::plotly
            any::mice
            any::DT
            any::haven
            any::readxl
            any::shiny
            any::bslib
            any::future
            any::promises
            any::jsonlite
            any::yaml
            any::zip
          dependencies: '"hard"'

      - name: Install jmvtools and zip
        run: Rscript -e 'install.packages(c("jmvtools","zip"), repos = c("https://repo.jamovi.org", getOption("repos")))'

      - name: Read package version
        id: ver
        shell: bash
        run: |
          v=$(grep -E '^Version:' DESCRIPTION | awk '{print $2}')
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building MVN $v"

      - name: Build .jmo
        shell: Rscript {0}
        run: |
          version <- "${{ steps.ver.outputs.version }}"
          suffix  <- "${{ matrix.config.suffix }}"
          out     <- file.path(getwd(), sprintf("MVN_%s-%s.jmo", version, suffix))

          home    <- normalizePath(file.path(getwd(), "_jamovi_home"), mustWork = FALSE)
          unlink(home, recursive = TRUE, force = TRUE)
          modroot <- file.path(home, "Resources", "jamovi", "modules")
          dir.create(modroot, recursive = TRUE, showWarnings = FALSE)
          dir.create(file.path(home, "Resources", "lib"), recursive = TRUE, showWarnings = FALSE)
          Sys.setenv(JAMOVI_HOME = home)

          jmvtools::install(".")

          moddir <- file.path(modroot, "MVN")
          if (!dir.exists(moddir)) {
            cat("modules dir contents:\n"); print(list.files(modroot, recursive = TRUE))
            stop("jmvtools::install did not produce MVN module dir")
          }

          if (file.exists(out)) file.remove(out)
          zip::zip(out, files = "MVN", root = modroot)
          if (!file.exists(out)) stop("zip step did not produce ", out)
          cat("built:", out, "size:", file.info(out)$size, "bytes\n")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MVN-${{ steps.ver.outputs.version }}-${{ matrix.config.suffix }}
          path: MVN_${{ steps.ver.outputs.version }}-${{ matrix.config.suffix }}.jmo
          if-no-files-found: error

  release:
    name: Attach to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.jmo
          fail_on_unmatched_files: true
